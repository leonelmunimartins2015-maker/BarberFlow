<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Painel Administrativo</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    max-width:450px;
    margin:40px auto;
    background:#222;
    padding:25px;
    border-radius:15px;
}

input,
select,
button{

    width:95%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;

}

button{

    background:#c89b3c;
    color:white;
    font-size:17px;
    cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h1>⚙️ Painel Administrativo</h1>

<h3>Configurações da Agenda</h3>

<label>Início do expediente</label>

<input
type="time"
name="inicio_expediente"
value="{{ config.inicio_expediente }}"
>

<label>Fim do expediente</label>

<input
type="time"
name="fim_expediente"
value="{{ config.fim_expediente }}"
>

<label>Agenda aberta por</label>

<select>

<option>1 semana</option>

<option selected>2 semanas</option>

<option>3 semanas</option>

<option>4 semanas</option>

</select>

<button>

Salvar Configurações

</button>

<br><br>

<a href="/agenda">

Voltar para Agenda

</a>

</div>

</body>

</html>
