<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Painel Administrativo</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    max-width:450px;
    margin:40px auto;
    background:#222;
    padding:25px;
    border-radius:15px;
}

input,
select,
button{

    width:95%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;

}

button{

    background:#c89b3c;
    color:white;
    font-size:17px;
    cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<form method="POST" action="/salvar_configuracoes">

<h1>⚙️ Painel Administrativo</h1>

<h3>Configurações da Agenda</h3>

<label>Início do expediente</label>

<input
type="time"
name="inicio_expediente"
value="{{ config.inicio_expediente }}"
>

<label>Fim do expediente</label>

<input
type="time"
name="fim_expediente"
value="{{ config.fim_expediente }}"
>

<label>Agenda aberta por</label>

<select name="semanas_agenda">

<option value="1" {% if config.semanas_agenda == 1 %}selected{% endif %}>
1 semana
</option>

<option value="2" {% if config.semanas_agenda == 2 %}selected{% endif %}>
2 semanas
</option>

<option value="3" {% if config.semanas_agenda == 3 %}selected{% endif %}>
3 semanas
</option>

<option value="4" {% if config.semanas_agenda == 4 %}selected{% endif %}>
4 semanas
</option>

</select>
<button>

Salvar Configurações

</button>

    <hr>

<h3>Serviços</h3>

<label>Corte (minutos)</label>
<input type="number" name="corte" value="30">
<label>Corte e pigmentação (minutos)</label>
<input type="number" name="pigmentacao" value="60">

<label>Corte e barba (minutos)</label>
<input type="number" name="corte_barba" value="40">

<label>Corte e sobrancelha (minutos)</label>
<input type="number" name="corte_sobrancelha" value="35">

<label>Barba (minutos)</label>
<input type="number" name="barba" value="15">
<label>Corte, barba e pigmentação (minutos)</label>
<input type="number" name="corte_barba_pigmentacao" value="65">
</form>
    
<br><br>

<a href="/logout">
Sair do Painel
</a>
<br><br>

<a href="/agenda">

Voltar para Agenda

</a>

</div>

</body>

</html>
