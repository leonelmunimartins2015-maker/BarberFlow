<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Clientes - BarberFlow</title>

<style>
body {
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

.container {
    margin:50px auto;
    width:90%;
    max-width:400px;
    background:#222;
    padding:25px;
    border-radius:15px;
}

input {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:0;
}

button {
    width:95%;
    padding:12px;
    margin:10px;
    border:0;
    border-radius:8px;
    background:#c89b3c;
    color:white;
    font-size:16px;
}
</style>

</head>

<body>

<div class="container">

<h1>💈 Clientes</h1>

<form method="POST" action="/cadastrar_cliente">

<input 
type="text" 
name="nome"
placeholder="Nome do cliente"
required>

<input 
type="text"
name="telefone"
placeholder="Telefone"
required>

<button type="submit">
Cadastrar Cliente
</button>

</form>

</div>

</body>
</html>
